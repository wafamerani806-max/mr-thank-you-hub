    <!-- Tailwind Config & Custom CSS -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: '#D4AF37',
              'gold-light': '#F3E5AB',
              pink: '#E8B4B8',
              'deep-black': '#050505',
            },
            fontFamily: {

    <style>
      body {
        background-color: #050505;
        color: white;
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
      }

      /* Golden Gradient Beam Background (Luxury Silk) */
      .beams-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-color: #050505;
        overflow: hidden;
      }

      .silk-beam-1 {
        position: absolute;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background: conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(212, 175, 55, 0.08) 45deg, rgba(212, 175, 55, 0.15) 90deg, transparent 150deg);
        filter: blur(80px);
        animation: rotate-silk 25s linear infinite;
      }

      .silk-beam-2 {
        position: absolute;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(232, 180, 184, 0.04) 45deg, rgba(212, 175, 55, 0.1) 90deg, transparent 150deg);
        filter: blur(100px);
        animation: rotate-silk 35s linear infinite reverse;
      }

      @keyframes rotate-silk {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Glassmorphism Float */
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        transition: all 0.3s ease;
      }

      .glass-card:hover {
        transform: translateY(-5px) scale(1.05);
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(212, 175, 55, 0.5);
        box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
      }

      /* Glowing Text */
      .text-glow {
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
      }

      /* Pulse Animation for Globe */
      @keyframes pulse-svg {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(4); opacity: 0; }
      }

      .pulse-dot-svg {
        transform-origin: center;
        animation: pulse-svg 2s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      }
      
      /* Image Placeholder Hover */
      .img-placeholder {
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), transparent);
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      .glass-card:hover .img-placeholder {
        opacity: 1;
      }
      
      .icon-wrapper {
        transition: color 0.3s ease;
      }
      .glass-card:hover .icon-wrapper {
        color: white;
      }
      .title-wrapper {
        transition: color 0.3s ease;
      }
      .glass-card:hover .title-wrapper {
        color: #D4AF37;
      }
    </style>
